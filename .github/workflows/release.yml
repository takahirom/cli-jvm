name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Isolated from normal CI: HOMEBREW_TAP_TOKEN lives as an *environment*
    # secret on 'release', so pull-request workflows can never read it.
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build distribution
        working-directory: clijvm
        run: ./gradlew distTar -PclijvmVersion=${{ github.ref_name }} --stacktrace

      - name: Compute checksum
        id: checksum
        working-directory: clijvm
        run: |
          TARBALL="build/distributions/clijvm-${{ github.ref_name }}.tar.gz"
          SHA=$(shasum -a 256 "$TARBALL" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tarball=clijvm/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/takahirom/homebrew-repo.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/clijvm.rb <<FORMULA
          class Clijvm < Formula
            desc "AI-friendly JVM profiler CLI built on JDK Flight Recorder"
            homepage "https://github.com/takahirom/cli-jvm"
            url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/clijvm-${{ github.ref_name }}.tar.gz"
            sha256 "${{ steps.checksum.outputs.sha256 }}"
            license "Apache-2.0"

            # clijvm needs a full JDK (attach API + jcmd), which Homebrew's openjdk provides.
            depends_on "openjdk"

            def install
              rm_f Dir["bin/*.bat"]
              libexec.install %w[bin lib]
              env = Language::Java.overridable_java_home_env
              (bin/"clijvm").write_env_script libexec/"bin/clijvm", env
            end

            test do
              assert_match "Usage", shell_output("#{bin}/clijvm --help")
            end
          end
          FORMULA
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/clijvm.rb
          git commit -m "Update clijvm to ${{ github.ref_name }}"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.checksum.outputs.tarball }}
          fail_on_unmatched_files: true
          body: |
            ## clijvm ${{ github.ref_name }}

            Install: `brew install takahirom/repo/clijvm`

            The Homebrew formula in `takahirom/homebrew-repo` is updated automatically
            (requires the `HOMEBREW_TAP_TOKEN` environment secret on `release`).

      - name: Formula update reminder
        run: |
          {
            echo "### Release ${{ github.ref_name }} published :rocket:"
            echo ""
            echo "Update \`takahirom/homebrew-repo\` → \`Formula/clijvm.rb\`:"
            echo '```ruby'
            echo 'url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/clijvm-${{ github.ref_name }}.tar.gz"'
            echo 'sha256 "${{ steps.checksum.outputs.sha256 }}"'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

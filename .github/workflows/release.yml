name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build distribution
        working-directory: clijvm
        run: ./gradlew distTar -PclijvmVersion=${{ github.ref_name }} --stacktrace

      - name: Compute checksum
        id: checksum
        working-directory: clijvm
        run: |
          TARBALL="build/distributions/clijvm-${{ github.ref_name }}.tar.gz"
          SHA=$(shasum -a 256 "$TARBALL" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tarball=clijvm/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.checksum.outputs.tarball }}
          fail_on_unmatched_files: true
          body: |
            ## clijvm ${{ github.ref_name }}

            Install: `brew install takahirom/repo/clijvm`

            <details>
            <summary>Homebrew formula update (manual)</summary>

            In `takahirom/homebrew-repo`, set `Formula/clijvm.rb`:

            ```ruby
            url "https://github.com/takahirom/jvm-profiler-cli/releases/download/${{ github.ref_name }}/clijvm-${{ github.ref_name }}.tar.gz"
            sha256 "${{ steps.checksum.outputs.sha256 }}"
            ```
            </details>

      - name: Formula update reminder
        run: |
          {
            echo "### Release ${{ github.ref_name }} published :rocket:"
            echo ""
            echo "Update \`takahirom/homebrew-repo\` → \`Formula/clijvm.rb\`:"
            echo '```ruby'
            echo 'url "https://github.com/takahirom/jvm-profiler-cli/releases/download/${{ github.ref_name }}/clijvm-${{ github.ref_name }}.tar.gz"'
            echo 'sha256 "${{ steps.checksum.outputs.sha256 }}"'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
